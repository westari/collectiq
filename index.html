<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParlAI — AI-Powered Parlay Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060A12;
  --surface: #0F1520;
  --text: #E8ECF4;
  --purple: #A855F7;
  --blue: #2E7CF6;
  --green: #22C55E;
  --border: rgba(255,255,255,0.06);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  margin: 0;
}

/* CLEANED BACKGROUND EFFECTS */
.bg-glow-1 {
  position: fixed;
  top: -200px;
  right: -100px;
  width: 900px;
  height: 900px;
  background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
  pointer-events: none;
}

/* NAVIGATION */
nav {
  background: rgba(6,10,18,0.95);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo-img {
  height: 44px;
  /* PLACEHOLDER FOR YOUR LOGO */
  content: url('logo.png'); 
  border-radius: 5px;
}

/* HERO SECTION */
.hero {
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 24px;
  text-align: center;
}

.hero h1 {
  font-family: 'Bebas Neue';
  font-size: 70px;
  letter-spacing: 3px;
  line-height: 0.95;
}

.accent {
  background: linear-gradient(135deg, var(--purple), #06D6F2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn-primary {
  font-family: 'Bebas Neue';
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff;
  padding: 14px 36px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="bg-glow-1"></div>
<nav>
  <div class="nav-inner">
    <div class="nav-logo">
      <img src="logo.png" alt="ParlAI Logo" class="nav-logo-img">
    </div>
    <button class="nav-btn">GET STARTED</button>
  </div>
</nav>

<div class="hero">
  <h1>BUILD <span class="accent">SMARTER</span> PARLAYS</h1>
  <p>AI-powered sports betting analysis for West Growth projects.</p>
  <button class="btn-primary">START ANALYZING</button>
</div>
</body>
</html>
